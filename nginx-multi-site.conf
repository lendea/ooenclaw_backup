server {
    listen 3000;
    server_name _;

    # 个人主页
    location /personal-site {
        alias /home/admin/.openclaw/workspace/personal-site;
        index index.html;
        try_files $uri $uri/ /personal-site/index.html;
    }

    # 博客（示例）
    location /blog {
        alias /home/admin/.openclaw/workspace/blog;
        index index.html;
        try_files $uri $uri/ /blog/index.html;
    }

    # 文档（示例）
    location /docs {
        alias /home/admin/.openclaw/workspace/docs-site;
        index index.html;
        try_files $uri $uri/ /docs/index.html;
    }

    # 默认根路径
    location / {
        return 301 /personal-site;
    }
}
